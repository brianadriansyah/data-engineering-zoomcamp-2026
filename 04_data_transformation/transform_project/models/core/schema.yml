version: 2

models:
  - name: fact_trips
    description: "Tabel fakta utama yang menggabungkan data perjalanan taksi kuning dengan informasi zona."
    columns:
      - name: trip_id
        description: "Primary key unik untuk setiap perjalanan."
        tests:
          - unique
          - not_null
      - name: passenger_count
        description: "Jumlah penumpangg dalam satu perjalanan."
        tests:
          - accepted_values:
              values: [1, 2, 3, 4, 5, 6, 7, 8, 9]
              severity: warn
      - name: total_amount
        description: "Total biaya perjalanan termasuk tip dan pajak."
        tests:
          - dbt_utils.expression_is_true:
              expression: ">=0"
       